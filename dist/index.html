<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VORTEX Shell</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: rgba(15, 20, 35, 0.85);
      --bg-secondary: rgba(25, 30, 45, 0.7);
      --accent: rgb(100, 150, 255);
      --accent-glow: rgba(100, 150, 255, 0.4);
      --text-primary: rgb(220, 230, 255);
      --text-secondary: rgb(160, 180, 220);
      --border-color: rgba(80, 100, 150, 0.3);
    }

    html, body {
      height: 48px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .shell {
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 16px;
      background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      border-bottom: 1px solid var(--border-color);
    }

    .shell::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    }

    .start-button {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .start-button:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
    }

    .start-button svg {
      width: 24px;
      height: 24px;
      fill: var(--accent);
    }

    .taskbar-items {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 16px;
      flex: 1;
      -webkit-app-region: no-drag;
    }

    .taskbar-item {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .taskbar-item:hover {
      background: var(--accent-glow);
    }

    .taskbar-item.active {
      background: rgba(100, 150, 255, 0.2);
      border-color: var(--accent);
    }

    .taskbar-item svg {
      width: 20px;
      height: 20px;
      fill: var(--text-secondary);
    }

    .taskbar-item.active svg {
      fill: var(--accent);
    }

    .spacer {
      flex: 1;
    }

    .system-tray {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .tray-item {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tray-item:hover {
      background: var(--accent-glow);
      color: var(--text-primary);
    }

    .clock {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 4px;
    }

    .window-controls {
      display: flex;
      gap: 2px;
      margin-left: 8px;
    }

    .window-btn {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 4px;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .window-btn:hover {
      background: var(--accent-glow);
    }

    .window-btn.close:hover {
      background: rgba(255, 80, 80, 0.3);
    }

    .window-btn svg {
      width: 14px;
      height: 14px;
      fill: var(--text-secondary);
    }

    .window-btn:hover svg {
      fill: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="shell">
    <button class="start-button" id="startBtn" title="Start Menu">
      <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg>
    </button>

    <div class="taskbar-items" id="taskbar">
      <!-- Taskbar items will be populated dynamically -->
    </div>

    <div class="spacer"></div>

    <div class="system-tray">
      <div class="tray-item">⟳</div>
      <div class="tray-item">🔊</div>
      <div class="clock" id="clock">12:00</div>
    </div>

    <div class="window-controls">
      <button class="window-btn minimize" id="minimizeBtn" title="Minimize">
        <svg viewBox="0 0 24 24"><path d="M6 12h12v2H6z"/></svg>
      </button>
      <button class="window-btn maximize" id="maximizeBtn" title="Maximize">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/></svg>
      </button>
      <button class="window-btn close" id="closeBtn" title="Close">
        <svg viewBox="0 0 24 24"><path d="M18.3 5.71a.996.996 0 0 0-1.41 0L12 10.59 7.11 5.7A.996.996 0 1 0 5.7 7.11L10.59 12 5.7 16.89a.996.996 0 1 0 1.41 1.41L12 13.41l4.89 4.89a.996.996 0 1 0 1.41-1.41L13.41 12l4.89-4.89c.38-.38.38-1.02 0-1.4z"/></svg>
      </button>
    </div>
  </div>

  <script type="module">
    const { getCurrentWindow } = window.__TAURI__.window;

    // Clock update
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Window controls
    document.getElementById('closeBtn').addEventListener('click', async () => {
      const win = getCurrentWindow();
      await win.close();
    });

    document.getElementById('minimizeBtn').addEventListener('click', async () => {
      const win = getCurrentWindow();
      await win.minimize();
    });

    document.getElementById('maximizeBtn').addEventListener('click', async () => {
      const win = getCurrentWindow();
      const isMaximized = await win.isMaximized();
      if (isMaximized) {
        await win.unmaximize();
      } else {
        await win.maximize();
      }
    });

    // Start button
    document.getElementById('startBtn').addEventListener('click', () => {
      console.log('Start menu clicked');
      // Emit event to Rust backend to show start menu
    });

    // Handle window dragging from empty areas
    document.body.addEventListener('mousedown', (e) => {
      if (e.target === document.body || e.target.classList.contains('shell')) {
        getCurrentWindow().startDragging();
      }
    });

    // Listen for window events from Rust
    window.__TAURI__.event.listen('window-event', (event) => {
      console.log('Window event:', event.payload);
    });
  </script>
</body>
</html>
